name: aquasensors
description: AquaSensors — Control de calidad del agua para albercas.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.4
  provider: ^6.1.2
  http: ^1.2.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  permission_handler: ^11.3.1
  network_info_plus: ^6.1.1
  flutter_blue_plus: ^1.35.5
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Logo.jpg"
  adaptive_icon_foreground: "assets/images/Logo.jpg"
  adaptive_icon_background: "#0F4D66"
  adaptive_icon_foreground_inset: 0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/Inicio_Sesion/
